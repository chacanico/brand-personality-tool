<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>API Test</title>
  <style>
    body { font-family: monospace; padding: 40px; background: #f5f5f5; }
    button { padding: 12px 24px; font-size: 16px; cursor: pointer; }
    pre { background: white; padding: 20px; margin-top: 20px; border-radius: 8px; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>Anthropic API — proof of concept</h2>
  <button onclick="test()">Call API</button>
  <pre id="output">Click the button...</pre>

  <script>
    async function test() {
      const out = document.getElementById('output');
      out.textContent = 'Calling /api/summary...';
      try {
        const res = await fetch('/api/summary', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'claude-sonnet-4-6',
            max_tokens: 100,
            messages: [{ role: 'user', content: 'Say "it works" and nothing else.' }]
          })
        });
        const data = await res.json();
        out.textContent = 'Status: ' + res.status + '\n\n' + JSON.stringify(data, null, 2);
      } catch(e) {
        out.textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
